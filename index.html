<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Google SEO Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.7);
            --primary: #58a6ff;
            --primary-hover: #3182ce;
            --danger: #f85149;
            --danger-hover: #da3633;
            --success: #2ea043;
            --text: #c9d1d9;
            --input-bg: rgba(240, 246, 252, 0.05);
            --input-border: rgba(240, 246, 252, 0.1);
            --glow: 0 0 20px rgba(88, 166, 255, 0.15);
        }
        
        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(88, 166, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(46, 160, 67, 0.04), transparent 30%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 0;
            box-sizing: border-box;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-user-select: none; /* Make it feel like a desktop app */
            user-select: none;
        }

        .app-container {
            width: 380px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--input-border);
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), var(--glow);
            padding: 30px 25px;
            position: relative;
        }

        /* Top decorative line */
        .app-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
        }

        h4 {
            text-align: center;
            font-weight: 800;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            color: #ffffff;
            font-size: 1.25rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .input-group {
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border-radius: 6px;
        }

        .input-group-text {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--input-border);
            border-right: none;
            color: #8b949e;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            width: 95px; /* Aligns all inputs */
            justify-content: center;
        }

        .form-control, .custom-select, .form-select {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--input-border);
            color: #ffffff !important;
            font-size: 13px;
            padding: 8px 12px;
        }

        .form-control:focus, .form-select:focus {
            background-color: rgba(255, 255, 255, 0.08) !important;
            border-color: var(--primary);
            box-shadow: inset 0 0 0 1px var(--primary);
        }

        .form-control::placeholder {
            color: #484f58;
        }

        .btn {
            font-weight: 700;
            letter-spacing: 0.5px;
            border-radius: 8px;
            padding: 10px 0;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: 13px;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #0d1117;
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(88, 166, 255, 0.3);
            color: #000;
        }

        .btn-danger {
            background-color: var(--danger);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(248, 81, 73, 0.2);
        }

        .btn-danger:hover {
            background-color: var(--danger-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(248, 81, 73, 0.3);
            color: #fff;
        }

        .stats-panel {
            margin-top: 25px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            flex: 1;
        }

        .stat-item:not(:last-child) {
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .stat-label {
            color: #8b949e;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 15px 0;
            padding-left: 5px;
        }

        .form-check-label {
            font-weight: 500 !important;
            color: #8b949e;
            font-size: 13px;
            cursor: pointer;
            margin-top: 2px;
        }

        .form-check-input {
            cursor: pointer;
            background-color: var(--input-bg);
            border-color: var(--input-border);
            width: 16px;
            height: 16px;
            margin: 0;
        }

        .form-check-input:checked {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        #alert {
            font-size: 13px;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            backdrop-filter: blur(10px);
        }
        .alert-danger { background: rgba(248, 81, 73, 0.15); color: #ff7b72; border: 1px solid rgba(248, 81, 73, 0.3); }
        .alert-success { background: rgba(46, 160, 67, 0.15); color: #56d364; border: 1px solid rgba(46, 160, 67, 0.3); }

        /* Small layout adjustments */
        .row.gx-2 {
            display: flex;
            gap: 10px;
        }
        .row.gx-2 > div {
            flex: 1;
        }
        .row.gx-2 .input-group-text {
            width: 65px;
        }

        .info-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 6px;
            color: var(--primary);
            cursor: help;
            font-size: 11px;
            font-weight: 800;
            border: 1px solid var(--primary);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            opacity: 0.7;
            transition: all 0.2s;
            position: relative;
        }
        .info-icon:hover {
            opacity: 1;
            background: var(--primary);
            color: #0d1117;
        }
        .info-icon::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(13, 17, 23, 0.95);
            color: #c9d1d9;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 500;
            line-height: 1.4;
            border-radius: 6px;
            border: 1px solid rgba(88, 166, 255, 0.3);
            white-space: normal;
            width: 220px;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .info-icon:hover::after {
            opacity: 1;
            visibility: visible;
            bottom: 140%;
        }
        .input-desc {
            font-size: 10px;
            color: #8b949e;
            margin-top: 4px;
            margin-bottom: 8px;
            padding-left: 2px;
            font-style: italic;
            text-align: center;
        }
        #option-desc {
            font-size: 11.5px;
            color: #8b949e;
            margin-top: 6px;
            margin-bottom: 12px;
            padding-left: 4px;
            font-style: italic;
        }
        .form-check-input:disabled ~ .form-check-label {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .form-check-input:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <h4>GOOGLE SEO BOT</h4>
        <div>
            <div class="alert" role="alert" id="alert" style="display: none;"></div>
            
            <div class="input-group mb-3">
                <span class="input-group-text">URL</span>
                <input type="text" id="url" class="form-control" placeholder="https://example.com">
            </div>
            
            <div class="input-group mb-3" id="keyboard">
                <span class="input-group-text">KEYWORD</span>
                <input type="text" id="keyboard-i" class="form-control" placeholder="Search phrase...">
            </div>
            
            <div class="row gx-2 mb-2">
                <div>
                    <div class="input-group">
                        <span class="input-group-text">COUNT</span>
                        <input type="number" id="count" class="form-control" placeholder="10">
                    </div>
                    <div class="input-desc">Total visits to complete</div>
                </div>
                <div>
                    <div class="input-group">
                        <span class="input-group-text">TABS</span>
                        <input type="number" id="maxTabs" class="form-control" placeholder="5" value="5">
                    </div>
                    <div class="input-desc">Max tabs open at once</div>
                </div>
            </div>

            <div class="input-group">
                <span class="input-group-text">OPTIONS</span>
                <select id="option" class="form-select" style="border-top-left-radius: 0; border-bottom-left-radius: 0;">
                    <option value="Direct">Direct Traffic</option>
                    <option value="Google">Google Search</option>
                    <option value="Proxy">Proxy Server</option>
                </select>
            </div>
            <div id="option-desc">Loading description...</div>
            
            <div class="input-group mb-2 mt-2">
                <span class="input-group-text">PROXIES</span>
                <input type="text" id="proxys" class="form-control" placeholder="Loading..." disabled>
            </div>

            <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" id="use-proxies" checked>
                <label class="form-check-label" for="use-proxies">
                    Use proxy list
                </label>
                <span class="info-icon" data-tooltip="If unchecked, the bot will use your regular network IP instead of routing through proxyscrape IPs. Use if receiving proxy errors">?</span>
            </div>
            
            <div class="form-check mt-3">
                <input class="form-check-input" type="checkbox" id="headless">
                <label class="form-check-label" for="headless">
                    Run invisibly (Headless Mode)
                </label>
                <span class="info-icon" data-tooltip="Runs Chrome completely hidden. Uses less CPU but is easier for anti-bot systems to detect.">?</span>
            </div>
            
            <div class="form-check" style="margin-top: 8px; margin-bottom: 5px;">
                <input class="form-check-input" type="checkbox" id="minimize-windows" checked>
                <label class="form-check-label" for="minimize-windows">
                    Auto-minimize tasks to Dock
                </label>
                <span class="info-icon" data-tooltip="Opens the window natively but sweeps it into your macOS Dock instantly. Great for stealth and keeping your screen clean.">?</span>
            </div>
        </div>
        
        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button type="button" class="btn btn-primary flex-grow-1" id="start">▶ START</button>
            <button type="button" class="btn btn-danger flex-grow-1" id="stop">■ STOP</button>
        </div>
        
        <!-- Stats UI -->
        <div class="stats-panel">
            <div class="stat-item">
                <span class="stat-label">Active</span>
                <span style="color: var(--primary); font-size: 20px; font-weight: 700;" id="stat-active">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Left</span>
                <span style="color: var(--text); font-size: 20px; font-weight: 700;" id="stat-remaining">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Done</span>
                <span style="color: var(--success); font-size: 20px; font-weight: 700;" id="stat-completed">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Failed</span>
                <span style="color: var(--danger); font-size: 20px; font-weight: 700;" id="stat-failed">0</span>
            </div>
        </div>
    </div>
    
    <script src="./renderer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
